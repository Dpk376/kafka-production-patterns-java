<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kafka Patterns DX Visualizer</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --danger: #ef4444;
      --danger-hover: #dc2828;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 800px;
      width: 100%;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      margin-bottom: 2rem;
    }

    .controls {
      display: flex;
      gap: 1rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 1rem;
      width: 120px;
    }

    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
      margin-left: auto;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
      transform: translateY(-1px);
    }

    .log-container {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      height: 300px;
      overflow-y: auto;
      font-family: 'Fira Code', monospace;
      font-size: 0.875rem;
    }

    .log-entry {
      margin-bottom: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.3s ease;
    }

    .log-time {
      color: var(--text-muted);
      margin-right: 0.5rem;
    }

    .log-success { color: #4ade80; }
    .log-error { color: #f87171; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Kafka DX Visualizer</h1>
      <p style="color: var(--text-muted)">Generate load, simulate failures, and watch the patterns in action.</p>
    </header>

    <div class="panel">
      <div class="controls">
        <div class="input-group">
          <label for="messageCount">Messages to Send</label>
          <input type="number" id="messageCount" value="10" min="1" max="10000">
        </div>
        <button class="btn-primary" onclick="generateTraffic()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          Send Traffic
        </button>

        <button class="btn-danger" onclick="generatePoisonPill()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01"/></svg>
          Inject Poison Pill (DLQ)
        </button>
      </div>
    </div>

    <div class="panel">
      <h3>Event Log</h3>
      <div class="log-container" id="logContainer">
        <!-- Logs appear here -->
      </div>
    </div>
  </div>

  <script>
    function addLog(message, type = 'success') {
      const logContainer = document.getElementById('logContainer');
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${message}</span>`;
      logContainer.prepend(entry);
    }

    async function generateTraffic() {
      const count = document.getElementById('messageCount').value;
      addLog(`Initiating generation of ${count} order events...`, 'success');
      
      try {
        const response = await fetch(`/api/load/generate?count=${count}`, { method: 'POST' });
        if (response.ok) {
          const text = await response.text();
          addLog(`Success: ${text}`, 'success');
        } else {
          addLog(`Failed: HTTP ${response.status}`, 'error');
        }
      } catch (err) {
        addLog(`Network Error: ${err.message}`, 'error');
      }
    }

    async function generatePoisonPill() {
      addLog(`Injecting poison pill to trigger Dead Letter Queue...`, 'error');
      
      try {
        const response = await fetch('/api/load/poison', { method: 'POST' });
        if (response.ok) {
          const text = await response.text();
          addLog(`Success: ${text}`, 'success');
        } else {
          addLog(`Failed: HTTP ${response.status}`, 'error');
        }
      } catch (err) {
        addLog(`Network Error: ${err.message}`, 'error');
      }
    }
  </script>
</body>
</html>
