<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kafka Resilience Patterns DX</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #09090b;
      --panel-bg: rgba(24, 24, 27, 0.6);
      --panel-border: rgba(255, 255, 255, 0.08);
      --primary: #3b82f6;
      --primary-glow: rgba(59, 130, 246, 0.5);
      --danger: #ef4444;
      --danger-glow: rgba(239, 68, 68, 0.5);
      --accent: #a855f7;
      --accent-glow: rgba(168, 85, 247, 0.5);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 3rem 1rem;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.15), transparent 25%);
      background-attachment: fixed;
    }

    .app-container {
      max-width: 900px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 1rem;
      animation: fadeDown 0.8s ease-out;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #60a5fa 0%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 1.125rem;
      font-weight: 300;
    }

    /* Glassmorphism Panel */
    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.6s ease-out backwards;
    }

    .glass-panel:nth-child(2) { animation-delay: 0.1s; }
    .glass-panel:nth-child(3) { animation-delay: 0.2s; }
    .glass-panel:nth-child(4) { animation-delay: 0.3s; }

    h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      align-items: end;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--panel-border);
      color: var(--text-main);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.2s ease;
      width: 100%;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-glow);
    }

    /* Buttons */
    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      width: 100%;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 14px 0 var(--primary-glow);
    }

    .btn-primary:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
      box-shadow: 0 4px 14px 0 var(--danger-glow);
    }

    .btn-danger:hover {
      background: #dc2828;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6);
    }

    .btn-accent {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 14px 0 var(--accent-glow);
    }

    .btn-accent:hover {
      background: #9333ea;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(168, 85, 247, 0.6);
    }

    /* Log Console */
    .console-wrapper {
      position: relative;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 1rem;
      height: 350px;
      overflow: hidden;
    }

    .console-header {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .dot.red { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #27c93f; }

    .log-container {
      height: calc(100% - 2rem);
      overflow-y: auto;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.875rem;
      padding-right: 0.5rem;
      scroll-behavior: smooth;
    }

    /* Custom Scrollbar */
    .log-container::-webkit-scrollbar { width: 6px; }
    .log-container::-webkit-scrollbar-track { background: transparent; }
    .log-container::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }
    .log-container::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    .log-entry {
      margin-bottom: 0.5rem;
      line-height: 1.5;
      animation: fadeInLeft 0.3s ease-out;
      display: flex;
      gap: 0.75rem;
    }

    .log-time {
      color: #64748b;
      flex-shrink: 0;
    }

    .log-msg { flex-grow: 1; word-break: break-all; }
    .log-success .log-msg { color: #4ade80; }
    .log-error .log-msg { color: #f87171; }
    .log-info .log-msg { color: #60a5fa; }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Responsive */
    @media (max-width: 640px) {
      .controls-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>Kafka Resilience DX</h1>
      <p class="subtitle">Interactive visualizer for enterprise distributed patterns</p>
    </header>

    <div class="glass-panel">
      <h3>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        Traffic Generator
      </h3>
      <div class="controls-grid">
        <div class="input-group">
          <label for="messageCount">Events to Dispatch</label>
          <input type="number" id="messageCount" value="10" min="1" max="10000">
        </div>
        <div class="input-group">
          <button class="btn btn-primary" onclick="generateTraffic()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            Send Traffic
          </button>
        </div>
        <div class="input-group">
          <button class="btn btn-danger" onclick="generatePoisonPill()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01"/></svg>
            Inject Poison Pill
          </button>
        </div>
      </div>
    </div>

    <div class="glass-panel">
      <h3>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent)"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        Dead Letter Queue Management
      </h3>
      <div class="controls-grid">
        <div class="input-group">
          <label for="dlqTopic">DLQ Topic</label>
          <input type="text" id="dlqTopic" value="orders.v1.DLT">
        </div>
        <div class="input-group">
          <label for="originalTopic">Target Topic</label>
          <input type="text" id="originalTopic" value="orders.v1">
        </div>
        <div class="input-group">
          <label for="replayCount">Max Replay</label>
          <input type="number" id="replayCount" value="100" min="1" max="10000">
        </div>
        <div class="input-group">
          <button class="btn btn-accent" onclick="replayDlq()">
            Replay Messages
          </button>
        </div>
      </div>
    </div>

    <div class="glass-panel">
      <div class="console-wrapper">
        <div class="console-header">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        <div class="log-container" id="logContainer">
          <!-- Logs injected via JS -->
        </div>
      </div>
    </div>
  </div>

  <script>
    function addLog(message, type = 'info') {
      const logContainer = document.getElementById('logContainer');
      const time = new Date().toISOString().split('T')[1].substring(0, 12);
      
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      entry.innerHTML = `<span class="log-time">[${time}]</span><span class="log-msg">${message}</span>`;
      
      logContainer.appendChild(entry);
      logContainer.scrollTop = logContainer.scrollHeight;
    }

    addLog('System initialized. Awaiting commands...', 'info');

    async function generateTraffic() {
      const count = document.getElementById('messageCount').value;
      addLog(`Initiating generation of ${count} order events...`, 'info');
      
      try {
        const response = await fetch(`/api/load/generate?count=${count}`, { method: 'POST' });
        if (response.ok) {
          const text = await response.text();
          addLog(`Success: ${text}`, 'success');
        } else {
          addLog(`Failed: HTTP ${response.status}`, 'error');
        }
      } catch (err) {
        addLog(`Network Error: ${err.message}`, 'error');
      }
    }

    async function generatePoisonPill() {
      addLog(`Injecting poison pill to trigger Dead Letter Queue...`, 'error');
      
      try {
        const response = await fetch('/api/load/poison', { method: 'POST' });
        if (response.ok) {
          const text = await response.text();
          addLog(`Success: ${text}`, 'success');
        } else {
          addLog(`Failed: HTTP ${response.status}`, 'error');
        }
      } catch (err) {
        addLog(`Network Error: ${err.message}`, 'error');
      }
    }

    async function replayDlq() {
      const dlqTopic = document.getElementById('dlqTopic').value;
      const originalTopic = document.getElementById('originalTopic').value;
      const maxMessages = parseInt(document.getElementById('replayCount').value);
      
      addLog(`Initiating DLQ Replay: ${dlqTopic} -> ${originalTopic}...`, 'info');
      
      try {
        const response = await fetch('/api/kafka/dlq/replay', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dlqTopic, originalTopic, maxMessages })
        });
        
        if (response.ok) {
          const data = await response.json();
          addLog(`Success: Replayed ${data.replayedCount} messages.`, 'success');
        } else {
          addLog(`Failed: HTTP ${response.status}`, 'error');
        }
      } catch (err) {
        addLog(`Network Error: ${err.message}`, 'error');
      }
    }
  </script>
</body>
</html>
